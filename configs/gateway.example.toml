# jmunch-mcp gateway — example configuration
#
# Run with:
#   pip install 'jmunch-mcp[gateway]'
#   jmunch-mcp gateway --config configs/gateway.example.toml
#
# Point your app at http://127.0.0.1:7879 (via OPENAI_API_BASE, base_url, etc.)

[gateway]
listen = "127.0.0.1:7879"
default_upstream = "openai"
log_level = "INFO"

[[upstream]]
name = "openai"
kind = "openai"
base_url = "https://api.openai.com"
# api key read from $OPENAI_API_KEY by default.
# api_key_env = "MY_OPENAI_KEY"

[[upstream]]
name = "anthropic"
kind = "anthropic"
base_url = "https://api.anthropic.com"
# api key read from $ANTHROPIC_API_KEY.

[[upstream]]
name = "ollama"
kind = "openai"
base_url = "http://127.0.0.1:11434"

[interception]
# Tool-result payloads above this size (bytes/4 heuristic) get handle-ified.
threshold_tokens = 2000
# auto:   inject jmunch verbs when the request already declares tools
# always: inject unconditionally (useful for apps that don't set tools)
# never:  never inject; pure pass-through + request-side handle-ify only
inject_tools = "auto"

# Context-aware gate. A request is only handle-ified once its estimated
# size reaches this fraction of the model's context window.
# On a big-context model, compressing a request that comfortably fits
# only sheds detail the model still has room to hold — which shows up as
# "forgets mid-task". 0.0 disables the gate (compress every request, the
# previous behaviour). 0.5 = start compressing at half the window.
context_fraction = 0.5

# Recency window. Never handle-ify the last N tool_results in a
# request — they are the agent's live working set, and compressing them
# while it is mid-task is the most direct cause of dropped context.
# Older tool_results in the history are still compressed. 0 disables it.
recency_window = 4

# Context window (tokens) assumed for models not in the built-in table.
default_context_window = 128000

# Master switch for request-side handle-ification. Leave true; the
# `X-Jmunch-Handleify: false` request header flips it off per-call.
handleify = true

# Optional: teach the gateway about custom / newly released models.
# Exact name or name-prefix → context window in tokens. Wins over the
# built-in table.
# [interception.context_windows]
# "qwen3.6" = 262144
# "my-finetune" = 131072

[handles]
# TTL + persistent SQLite store ships in Phase 4. For Phase 1 handles are
# in-memory and session-scoped (matches today's MCP behavior).
ttl_seconds = 3600
store_path = "~/.jmunch/handles.db"
max_bytes = 2000000000
